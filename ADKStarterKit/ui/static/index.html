<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TravelBot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
  <div class="chat-wrapper">

    <!-- Header -->
    <div class="chat-header">
      <div class="bot-avatar">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="20" fill="#1a56db"/>
          <rect x="8" y="18" width="24" height="14" rx="3" fill="white" opacity="0.9"/>
          <rect x="11" y="21" width="4" height="4" rx="1" fill="#1a56db"/>
          <rect x="17" y="21" width="4" height="4" rx="1" fill="#1a56db"/>
          <rect x="23" y="21" width="4" height="4" rx="1" fill="#1a56db"/>
          <rect x="16" y="10" width="8" height="10" rx="2" fill="white" opacity="0.9"/>
          <circle cx="20" cy="9" r="2" fill="white" opacity="0.7"/>
        </svg>
      </div>
      <div class="bot-info">
        <h1>TravelBot</h1>
        <span class="status"><span class="dot"></span>Online</span>
      </div>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="chatMessages">
      <div class="message bot-message">
        <div class="bot-bubble-avatar">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="16" cy="16" r="16" fill="#1a56db"/>
            <rect x="6" y="14" width="20" height="12" rx="2.5" fill="white" opacity="0.9"/>
            <rect x="9" y="17" width="3.5" height="3.5" rx="0.8" fill="#1a56db"/>
            <rect x="14" y="17" width="3.5" height="3.5" rx="0.8" fill="#1a56db"/>
            <rect x="19" y="17" width="3.5" height="3.5" rx="0.8" fill="#1a56db"/>
            <rect x="13" y="7" width="6" height="8" rx="1.5" fill="white" opacity="0.9"/>
            <circle cx="16" cy="6.5" r="1.5" fill="white" opacity="0.7"/>
          </svg>
        </div>
        <div class="bubble-content">
          <p>👋 Hello! I'm <strong>TravelBot</strong> — your AI travel planner. Ask me to plan a trip anywhere!</p>
          <span class="msg-time" id="welcomeTime"></span>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="chat-input-area">
      <button class="attach-btn" title="Attach">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <line x1="12" y1="8" x2="12" y2="16"/>
          <line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
      </button>
      <input type="text" id="messageInput" class="message-input" placeholder="Type your message..." autocomplete="off"/>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M22 2L11 13" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

  </div>
  <script src="/static/js/chat.js"></script>
  <script>document.getElementById('welcomeTime').textContent = getTime();</script>
</body>
</html>
